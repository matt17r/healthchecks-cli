# GoReleaser configuration for hc.
# Driven locally (no CI) — see RELEASING.md. Validate with `goreleaser check`.
version: 2

project_name: hc

before:
  hooks:
    - go mod tidy

builds:
  - binary: hc
    main: .
    env:
      - CGO_ENABLED=0
    # -trimpath strips local filesystem paths (e.g. /Users/<you>/...) from the
    # binary's debug info so releases don't leak the build machine's layout.
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Match the Makefile's version injection.
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Generates Casks/hc.rb into dist/. We deliberately DON'T let goreleaser push it
# to the tap (skip_upload): goreleaser would generate and push in one step,
# leaving no gap to lint the cask, and its template emits a stray blank line that
# trips brew's Layout/EmptyLinesAroundBlockBody audit. Instead scripts/release.sh
# runs `brew style --fix` on the generated cask and pushes it to the tap.
homebrew_casks:
  - name: hc
    skip_upload: "true"
    repository:
      owner: matt17r
      name: homebrew-tap
      branch: main
    directory: Casks
    homepage: "https://github.com/matt17r/healthchecks-cli"
    # No leading article — brew's Cask/Desc audit rejects "A …"/"The …".
    description: "Small, dependency-free CLI for the healthchecks.io Management API"
    commit_author:
      name: Matthew Lindfield Seager
      email: matt@matt17r.com
    # The binary is unsigned, so macOS Gatekeeper quarantines it on download.
    # Strip the quarantine xattr on install so `hc` runs without a warning.
    hooks:
      post:
        # Modifier-if form keeps brew's Style/IfUnlessModifier audit happy.
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/hc"] if OS.mac?
